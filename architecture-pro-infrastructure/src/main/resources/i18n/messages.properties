# i18n 默认消息
SUCCESS=操作成功
FAIL=操作失败

# Internal Error Codes
InternalErrorCode.INTERNAL_ERROR=系统内部错误
InternalErrorCode.SERVICE_UNAVAILABLE=服务不可用
InternalErrorCode.DATABASE_ERROR=数据库操作异常
InternalErrorCode.CACHE_ERROR=缓存操作异常
InternalErrorCode.NETWORK_ERROR=网络通信异常
InternalErrorCode.CONFIG_ERROR=系统配置异常
InternalErrorCode.SERIALIZATION_ERROR=序列化/反序列化异常

# Client Error Codes
ClientErrorCode.BAD_REQUEST=请求参数错误
ClientErrorCode.UNAUTHORIZED=未认证或认证已过期
ClientErrorCode.FORBIDDEN=没有访问权限
ClientErrorCode.NOT_FOUND=请求资源不存在
ClientErrorCode.METHOD_NOT_ALLOWED=请求方法不允许
ClientErrorCode.CONFLICT=资源冲突
ClientErrorCode.TOO_MANY_REQUESTS=请求过于频繁
ClientErrorCode.VALIDATION_ERROR=参数校验失败
ClientErrorCode.PAYLOAD_TOO_LARGE=请求数据过大

# Business Error Codes
BusinessErrorCode.BUSINESS_ERROR=业务处理异常
BusinessErrorCode.OPERATION_FAILED=操作失败
BusinessErrorCode.DATA_NOT_FOUND=数据不存在
BusinessErrorCode.DATA_ALREADY_EXISTS=数据已存在
BusinessErrorCode.DATA_IN_USE=数据正在使用中，无法删除
BusinessErrorCode.USER_NOT_FOUND=用户不存在
BusinessErrorCode.USER_DISABLED=用户已被禁用
BusinessErrorCode.USER_PASSWORD_ERROR=密码错误
BusinessErrorCode.USER_PASSWORD_EXPIRED=密码已过期
BusinessErrorCode.TOKEN_INVALID=Token无效
BusinessErrorCode.TOKEN_EXPIRED=Token已过期
BusinessErrorCode.REFRESH_TOKEN_INVALID=刷新Token无效
BusinessErrorCode.LOGIN_FAILED=账号或密码不正确
BusinessErrorCode.CAPTCHA_ERROR=验证码错误
BusinessErrorCode.CAPTCHA_EXPIRED=验证码已过期
BusinessErrorCode.PASSWORD_ERROR=密码错误
BusinessErrorCode.ACCOUNT_DISABLED=账号已被禁用
BusinessErrorCode.PASSWORD_MISMATCH=两次密码输入不一致
BusinessErrorCode.USER_ALREADY_EXISTS=用户已存在
BusinessErrorCode.ACCOUNT_LOCKED=账号已被锁定，请稍后重试
BusinessErrorCode.PASSWORD_SAME_AS_OLD=新密码不能与当前密码相同
BusinessErrorCode.EMAIL_REQUIRED=邮箱不能为空
BusinessErrorCode.EMAIL_NOT_BOUND=该邮箱未绑定任何账号
BusinessErrorCode.RESET_CODE_ERROR=重置验证码错误
BusinessErrorCode.RESET_CODE_EXPIRED=重置验证码已过期
BusinessErrorCode.RESET_CODE_SEND_TOO_FREQUENT=验证码发送过于频繁，请稍后重试
BusinessErrorCode.FILE_UPLOAD_FAILED=文件上传失败
BusinessErrorCode.FILE_NOT_FOUND=文件不存在
BusinessErrorCode.FILE_TYPE_NOT_ALLOWED=文件类型不允许
BusinessErrorCode.FILE_CONFIG_NOT_FOUND=文件配置不存在
BusinessErrorCode.FILE_CONFIG_DELETE_FAIL_MASTER=不能删除主配置
BusinessErrorCode.FILE_STORAGE_ERROR=文件存储服务异常
BusinessErrorCode.ROLE_NOT_FOUND=角色不存在
BusinessErrorCode.SYSTEM_ROLE_DELETE_FORBIDDEN=系统角色不可删除
BusinessErrorCode.SUPER_ROLE_EDIT_FORBIDDEN=最高权限角色不可编辑
BusinessErrorCode.USER_OPERATE_SELF_FORBIDDEN=不可操作当前登录用户
BusinessErrorCode.USER_DELETE_FORBIDDEN=无权限删除该用户
BusinessErrorCode.USER_UPDATE_FORBIDDEN=无权限修改该用户
BusinessErrorCode.SYSTEM_ROLE_CODE_IMMUTABLE=系统角色编码不允许修改
