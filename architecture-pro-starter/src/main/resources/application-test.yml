# 测试环境配置
spring:
  datasource:
    # MySQL 驱动类
    driver-class-name: com.mysql.cj.jdbc.Driver
    # 测试环境数据库连接串
    url: jdbc:mysql://localhost:3306/architecture_pro_test?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=GMT&allowPublicKeyRetrieval=true
    # 测试环境数据库用户名
    username: root
    # 测试环境数据库密码
    password: root
  data:
    redis:
      # 测试环境 Redis 主机
      host: localhost
      # 测试环境 Redis 端口
      port: 6379
      # 测试环境使用独立 Redis 库，避免污染开发数据
      database: 1

logging:
  level:
    # 测试环境业务日志级别
    com.architecturepro: INFO
  file:
    # 测试环境日志目录
    path: ./logs

architecture-pro:
  security:
    # 测试环境可公开 Swagger，便于接口调试
    swagger-public-enabled: true
    verification:
      # 验证码 HMAC 摘要密钥，测试环境建议通过环境变量覆盖
      secret: ${VERIFICATION_SECRET:change-this-verification-secret}
      # 邮件重置验证码有效期（秒）
      reset-code-ttl-seconds: 600
      # 邮件重置验证码重复发送间隔（秒）
      reset-code-resend-interval-seconds: 60

vg:
  # 测试环境默认关闭邮件模块，避免误发真实邮件
  lite-email:
    # 是否启用邮件模块
    enabled: false
